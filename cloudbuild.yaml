steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '--build-arg', 'VITE_VERTEX_PROXY_URL=$_VITE_VERTEX_PROXY_URL',
    '--build-arg', 'VITE_VERTEX_PROXY_SECRET=$_VITE_VERTEX_PROXY_SECRET',
    '--build-arg', 'VITE_ENABLE_AI_TOOLS=$_VITE_ENABLE_AI_TOOLS',
    '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cracked/cracked-frontend',
    '.'
  ]
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/cracked/cracked-frontend'
